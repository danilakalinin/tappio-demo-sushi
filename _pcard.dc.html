<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid rgba(36,33,31,.06);border-radius:22px;overflow:hidden;box-shadow:0 14px 30px -22px rgba(36,33,31,.4);transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .28s" style-hover="transform:translateY(-6px);box-shadow:0 26px 44px -24px rgba(36,33,31,.5)">
  <button onClick="{{ p.onOpen }}" style="all:unset;cursor:pointer;display:block">
    <div style="position:relative;height:172px;background:{{ p.grad }};display:grid;place-items:center;overflow:hidden">
      <sc-if value="{{ p.hasImg }}" hint-placeholder-val="{{ false }}">
        <img src="{{ p.img }}" alt="{{ p.name }}" style="width:100%;height:100%;object-fit:cover;transition:transform .4s cubic-bezier(.2,.7,.2,1)" style-hover="transform:scale(1.07)">
      </sc-if>
      <sc-if value="{{ noImg }}" hint-placeholder-val="{{ true }}">
        <div style="width:118px;height:118px;border-radius:50%;background:repeating-conic-gradient(rgba(255,255,255,.5) 0deg 24deg,rgba(255,255,255,.78) 24deg 48deg);display:grid;place-items:center;transition:transform .35s cubic-bezier(.2,.7,.2,1);box-shadow:0 18px 34px -18px rgba(36,33,31,.35)" style-hover="transform:scale(1.08) rotate(6deg)">
          <div style="width:58px;height:58px;border-radius:50%;background:#fff;display:grid;place-items:center;font-family:ui-monospace,monospace;font-size:9px;color:#B9857A;text-align:center;line-height:1.2">фото</div>
        </div>
      </sc-if>
      <sc-if value="{{ p.tag }}" hint-placeholder-val="{{ false }}">
        <span style="position:absolute;top:12px;left:12px;background:{{ p.tagBg }};color:#fff;font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px">{{ p.tag }}</span>
      </sc-if>
    </div>
  </button>
  <button onClick="{{ p.onFav }}" aria-label="В избранное" style="position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:16px;color:#F45B45;display:grid;place-items:center;box-shadow:0 6px 14px -8px rgba(36,33,31,.4)">{{ p.favIcon }}</button>

  <div style="padding:16px 16px 18px;display:flex;flex-direction:column;flex:1">
    <button onClick="{{ p.onOpen }}" style="all:unset;cursor:pointer;font-weight:700;font-size:16px;line-height:1.25;color:#24211F">{{ p.name }}</button>
    <div style="font-size:12.5px;color:#77716C;line-height:1.45;margin-top:6px;min-height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">{{ p.comp }}</div>
    <div style="display:flex;gap:10px;font-size:12px;color:#A79C93;margin-top:8px"><span>{{ p.weight }}</span><span>·</span><span>{{ p.pcsStr }}</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-family:'Unbounded',sans-serif;font-weight:700;font-size:20px;color:#24211F">{{ p.priceStr }}</span>
        <sc-if value="{{ p.hasOld }}" hint-placeholder-val="{{ false }}"><span style="font-size:14px;color:#B7A99D;text-decoration:line-through">{{ p.oldStr }}</span></sc-if>
      </div>
      <sc-if value="{{ p.inCart }}" hint-placeholder-val="{{ false }}">
        <div style="display:inline-flex;align-items:center;gap:12px;background:#FFF1E8;border-radius:999px;padding:5px 6px">
          <button onClick="{{ p.onDec }}" aria-label="Меньше" style="width:30px;height:30px;border-radius:50%;border:none;background:#fff;cursor:pointer;font-weight:700;color:#D94432;font-size:17px">−</button>
          <span style="font-weight:800;min-width:16px;text-align:center">{{ p.inCart }}</span>
          <button onClick="{{ p.onInc }}" aria-label="Больше" style="width:30px;height:30px;border-radius:50%;border:none;background:#F45B45;color:#fff;cursor:pointer;font-weight:700;font-size:17px">+</button>
        </div>
      </sc-if>
      <sc-if value="{{ notInCart }}" hint-placeholder-val="{{ true }}">
        <button onClick="{{ p.onAdd }}" style="background:linear-gradient(135deg,#F45B45,#D94432);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 10px 20px -10px rgba(244,91,69,.7);white-space:nowrap">В корзину</button>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:360},&quot;p&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const p = this.props.p || {};
    return { p, notInCart: !p.inCart, noImg: !p.hasImg };
  }
}
</script>
</body>
</html>
